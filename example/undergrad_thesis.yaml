numbering:
  enabled: true
  level_1:
    enabled: true
    template: '%1'
    strip_pattern: ^\d+\s*
    suffix: space
  level_2:
    enabled: true
    template: '%1.%2'
    strip_pattern: ^\d+(\.\d+)\s*
    suffix: space
  level_3:
    enabled: true
    template: '%1.%2.%3'
    strip_pattern: ^\d+(\.\d+){2}\s*
    suffix: space
  references:
    enabled: true
    template: '[%1]'
    suffix: space
