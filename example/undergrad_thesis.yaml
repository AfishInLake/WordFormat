# ===========================================================================
# 本科毕业论文格式配置示例
# ===========================================================================
# 本文件展示所有可配置字段及其默认值。
# 使用 YAML 锚点 &global_format 定义全局基础格式，
# 各章节通过 <<: *global_format 继承后覆写特定字段。
#
# 配置路径规则：<类别>.<类型>
#   abstract.chinese.title   — 中文摘要标题
#   abstract.chinese.body    — 中文摘要正文
#   abstract.chinese.keywords — 中文关键词
#   abstract.english.title   — 英文摘要标题
#   abstract.english.body    — 英文摘要正文
#   abstract.english.keywords — 英文关键词
#   headings.level_1/2/3      — 一/二/三级标题
#   body.text                 — 正文段落
#   figures.caption           — 图题注
#   figures.image             — 图片段落
#   tables.caption            — 表题注
#   tables.object             — 表格对象
#   references.title          — 参考文献标题
#   references.entry          — 参考文献条目
#   acknowledgements.title    — 致谢标题
#   acknowledgements.body     — 致谢正文
#
# 支持的单位格式：
#   字号：小四 / 四号 / 三号 / 小二 / 五号 / 数值(pt)
#   间距：0行 / 0.5行 / 1行 / 12磅 / 0.5cm
#   缩进：2字符 / -2.2字符(悬挂) / 0.75cm / 24磅
#   行距：单倍行距 / 1.5倍行距 / 2倍行距 / 最小值 / 固定值 / 多倍行距
#   字体颜色：黑色 / 红色 / 蓝色 等
#   对齐：左对齐 / 居中对齐 / 右对齐 / 两端对齐 / 分散对齐
# ===========================================================================

template_name: "山西晋中理工学院（毕业设计）"

# ---------------------------------------------------------------------------
# 预警开关：控制各字段差异是否在批注中显示（false=不显示该类型差异）
# ---------------------------------------------------------------------------
style_checks_warning:
  bold: true
  italic: false
  underline: false
  font_size: true
  font_name_cn: true
  font_name_en: true
  font_color: false
  alignment: true
  space_before: true
  space_after: true
  line_spacing: true
  line_spacing_rule: true
  left_indent: true
  right_indent: true
  first_line_indent: true
  builtin_style_name: true

# ---------------------------------------------------------------------------
# 全局基础格式（其他节通过 <<: *global_format 继承后再覆写）
# ---------------------------------------------------------------------------
global_format: &global_format
  alignment: '两端对齐'
  space_before: "0行"
  space_after: "0行"
  line_spacingrule: "1.5倍行距"
  line_spacing: '1.5倍'
  left_indent: "0字符"
  right_indent: "0字符"
  first_line_indent: '2字符'
  builtin_style_name: '正文'
  chinese_font_name: '宋体'
  english_font_name: 'Times New Roman'
  font_size: '小四'
  font_color: '黑色'
  bold: false
  italic: false
  underline: false

# ===========================================================================
# 摘要（中英文）
# ===========================================================================
abstract:
  chinese:
    # -- 中文摘要标题（"摘要"二字）--
    title:
      <<: *global_format
      alignment: '居中对齐'
      first_line_indent: '0字符'
      chinese_font_name: '黑体'
      font_size: '四号'
      bold: false

    # -- 中文摘要正文 --
    body:
      <<: *global_format
      alignment: '两端对齐'

    # -- 中文关键词 --
    keywords:
      <<: *global_format
      alignment: '两端对齐'
      first_line_indent: '2字符'
      font_size: '小四'
      label:
        <<: *global_format
        chinese_font_name: '黑体'
        font_size: '四号'
        bold: false
      rules:
        keyword_count:
          enabled: true
          count_min: 3
          count_max: 5
        trailing_punctuation:
          enabled: true
          forbidden_chars: "；，。、"

  english:
    # -- 英文摘要标题（"Abstract"）--
    title:
      <<: *global_format
      alignment: '居中对齐'
      first_line_indent: '0字符'
      font_size: '四号'
      bold: false

    # -- 英文摘要正文 --
    body:
      <<: *global_format
      alignment: '两端对齐'

    # -- 英文关键词 --
    keywords:
      <<: *global_format
      alignment: '两端对齐'
      first_line_indent: '2字符'
      font_size: '小四'
      label:
        <<: *global_format
        font_size: '四号'
        bold: false
      rules:
        keyword_count:
          enabled: true
          count_min: 3
          count_max: 5

# ===========================================================================
# 各级标题（章、节、小节）
# ===========================================================================
headings:
  level_1:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小二'
    bold: false
    space_before: "0.5行"
    space_after: "0.5行"
    builtin_style_name: 'Heading 1'

  level_2:
    <<: *global_format
    alignment: '左对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '三号'
    bold: false
    space_before: "0行"
    space_after: "0行"
    builtin_style_name: 'Heading 2'

  level_3:
    <<: *global_format
    alignment: '左对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小四'
    bold: false
    space_before: "0行"
    space_after: "0行"
    builtin_style_name: 'Heading 3'

# ===========================================================================
# 正文段落
# ===========================================================================
body:
  text:
    <<: *global_format
    rules:
      punctuation:
        enabled: true

# ===========================================================================
# 插图（题注 + 图片段落）
# ===========================================================================
figures:
  caption:
    <<: *global_format
    font_size: '五号'
    builtin_style_name: '题注'
    alignment: '居中对齐'
    first_line_indent: '0字符'
    caption_prefix: '图'
    rules:
      caption_numbering:
        enabled: true
        separator: '.'
        label_number_space: false

  image:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'

# ===========================================================================
# 表格（题注 + 表格对象）
# ===========================================================================
tables:
  caption:
    <<: *global_format
    font_size: '五号'
    builtin_style_name: '题注'
    alignment: '居中对齐'
    first_line_indent: '0字符'
    caption_prefix: '表'
    rules:
      caption_numbering:
        enabled: true
        separator: '.'
        label_number_space: false

  object:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'

# ===========================================================================
# 参考文献
# ===========================================================================
references:
  title:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '三号'
    bold: false

  entry:
    <<: *global_format
    alignment: '两端对齐'
    first_line_indent: '-2.2字符'
    left_indent: '0.26字符'
    chinese_font_name: '宋体'
    english_font_name: 'Times New Roman'
    font_size: '五号'

# ===========================================================================
# 致谢
# ===========================================================================
acknowledgements:
  title:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小二'
    bold: false

  body:
    <<: *global_format
    alignment: '两端对齐'
    font_size: '五号'

# ===========================================================================
# 标题自动编号
# ===========================================================================
numbering:
  enabled: true

  level_1:
    enabled: true
    template: '%1'
    suffix: 'space'
    numbering_indent:
    text_indent:

  level_2:
    enabled: true
    template: '%1.%2'
    suffix: 'space'
    numbering_indent:
    text_indent:

  level_3:
    enabled: true
    template: '%1.%2.%3'
    suffix: 'space'
    numbering_indent:
    text_indent:

  references:
    enabled: true
    template: '[%1]'
    suffix: 'space'
    numbering_indent:
    text_indent:
