# ===========================================================================
# WordFormat 配置文件模板
# ===========================================================================
# 本文件展示所有可配置字段及其默认值。
# 通过 YAML 锚点 &global_format 定义全局基础格式，
# 各章节通过 <<: *global_format 继承后覆写特定字段。
#
# 支持的单位格式：
#   字号：小四 / 四号 / 三号 / 小二 / 五号 / 数值(pt)
#   间距：0行 / 0.5行 / 1行 / 12磅 / 0.5cm
#   缩进：2字符 / -2.2字符(悬挂缩进，负值) / 0.75cm / 24磅
#   行距：单倍行距 / 1.5倍行距 / 2倍行距 / 最小值 / 固定值 / 多倍行距
#   字体颜色：黑色 / 红色 / 蓝色 等
#   对齐：左对齐 / 居中对齐 / 右对齐 / 两端对齐 / 分散对齐
# ===========================================================================

# ---------------------------------------------------------------------------
# 预警开关：控制各字段差异是否在批注中显示
# ---------------------------------------------------------------------------
style_checks_warning:
  bold: false
  italic: false
  underline: false
  font_size: false
  font_name: false
  font_color: false
  alignment: false
  space_before: false
  space_after: false
  line_spacing: false
  line_spacingrule: false
  left_indent: false
  right_indent: false
  first_line_indent: false
  builtin_style_name: false

# ---------------------------------------------------------------------------
# 全局基础格式（其他节通过 <<: *global_format 继承后再覆写）
# ---------------------------------------------------------------------------
global_format: &global_format
  # -- 段落格式 --
  alignment: '两端对齐'           # 左对齐/居中对齐/右对齐/两端对齐/分散对齐
  space_before: "0.5行"           # 段前间距
  space_after: "0.5行"            # 段后间距
  line_spacingrule: "1.5倍行距"   # 单倍行距/1.5倍行距/2倍行距/最小值/固定值/多倍行距
  line_spacing: '1.5倍'           # 行距参数
  left_indent: "0字符"            # 左侧缩进
  right_indent: "0字符"           # 右侧缩进
  first_line_indent: '2字符'      # 首行缩进（正值）/ 悬挂缩进（负值如 -2.2字符）
  builtin_style_name: '正文'      # Word 内置样式名
  # -- 字符格式 --
  chinese_font_name: '宋体'       # 中文字体
  english_font_name: 'Times New Roman'  # 英文字体
  font_size: '小四'               # 字号
  font_color: '黑色'              # 字体颜色
  bold: false                     # 加粗
  italic: false                   # 斜体
  underline: false                # 下划线

# ===========================================================================
# 摘要（中英文）
# ===========================================================================
abstract:
  chinese:
    chinese_title:
      <<: *global_format
      alignment: '居中对齐'
      first_line_indent: '0字符'
      chinese_font_name: '黑体'
      font_size: '小二'
      bold: true
    chinese_content:
      <<: *global_format
      alignment: '两端对齐'
  english:
    english_title:
      <<: *global_format
      alignment: '居中对齐'
      first_line_indent: '0字符'
      font_size: '四号'
      bold: true
    english_content:
      <<: *global_format
      alignment: '两端对齐'

  # -----------------------------------------------------------------------
  # 关键词（中英文）
  # -----------------------------------------------------------------------
  keywords:
    chinese:
      <<: *global_format
      alignment: '左对齐'
      first_line_indent: '0字符'
      font_size: '四号'
      # -- 关键词标签（"关键词："）的字符格式 --
      label:
        <<: *global_format
        chinese_font_name: '黑体'
        font_size: '四号'
        bold: true
      # -- 关键词数量和标点校验 --
      count_min: 3
      count_max: 5
      trailing_punct_forbidden: true
    english:
      <<: *global_format
      alignment: '左对齐'
      first_line_indent: '0字符'
      font_size: '四号'
      label:
        <<: *global_format
        font_size: '四号'
        bold: true
      count_min: 3
      count_max: 5
      trailing_punct_forbidden: true

# ===========================================================================
# 各级标题（章、节、小节）
# ===========================================================================
headings:
  level_1:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小二'
    bold: false
    space_before: "0.5行"
    space_after: "0.5行"
    builtin_style_name: 'Heading 1'

  level_2:
    <<: *global_format
    alignment: '左对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '三号'
    bold: false
    space_before: "0.5行"
    space_after: "0.5行"
    builtin_style_name: 'Heading 2'

  level_3:
    <<: *global_format
    alignment: '左对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小四'
    bold: false
    space_before: "0.5行"
    space_after: "0.5行"
    builtin_style_name: 'Heading 3'

# ===========================================================================
# 正文段落
# ===========================================================================
body_text:
  <<: *global_format

# ===========================================================================
# 插图题注（Figure）
# ===========================================================================
figures:
  <<: *global_format
  font_size: '五号'
  builtin_style_name: '题注'
  alignment: '居中对齐'
  first_line_indent: '0字符'
  caption_position: 'below'
  caption_prefix: '图'

# ===========================================================================
# 表格（题注 + 表格内容格式）
# ===========================================================================
tables:
  <<: *global_format
  font_size: '五号'
  builtin_style_name: '题注'
  alignment: '居中对齐'
  first_line_indent: '0字符'
  caption_position: 'above'
  caption_prefix: '表'
  # -- 表格内容格式（单元格内文字）--
  content:
    <<: *global_format
    chinese_font_name: '宋体'
    english_font_name: 'Times New Roman'
    font_size: '五号'
    line_spacingrule: '单倍行距'
    alignment: '居中对齐'
    first_line_indent: '0字符'
    space_before: "0行"
    space_after: "0行"

# ===========================================================================
# 参考文献
# ===========================================================================
references:
  title:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '三号'
    bold: true
    section_title: '参考文献'
  content:
    <<: *global_format
    alignment: '两端对齐'
    first_line_indent: '-2.2字符'   # 悬挂缩进（负值=悬挂）
    left_indent: '0.26字符'         # 文本之前
    chinese_font_name: '宋体'
    english_font_name: 'Times New Roman'
    font_size: '五号'
    # 以下字段为预留字段，当前暂未启用：
    entry_indent: 0.0
    entry_ending_punct: '.'
    numbering_format: '[1], [2], ...'

# ===========================================================================
# 致谢
# ===========================================================================
acknowledgements:
  title:
    <<: *global_format
    alignment: '居中对齐'
    first_line_indent: '0字符'
    chinese_font_name: '黑体'
    font_size: '小二'
    bold: true
  content:
    <<: *global_format
    alignment: '两端对齐'

# ===========================================================================
# 标题自动编号
# ===========================================================================
numbering:
  enabled: true

  level_1:
    enabled: true
    template: '%1'
    suffix: 'space'                 # tab / space / nothing
    numbering_indent:               # [可选] 编号缩进，如 '0字符'
    text_indent:                    # [可选] 文本悬挂缩进，如 '0.75cm'

  level_2:
    enabled: true
    template: '%1.%2'
    suffix: 'space'
    numbering_indent:
    text_indent:

  level_3:
    enabled: true
    template: '%1.%2.%3'
    suffix: 'space'
    numbering_indent:
    text_indent:

  references:
    enabled: true
    template: '[%1]'
    suffix: 'space'
    numbering_indent:
    text_indent:                    # 悬挂缩进，如 '2.2字符'
