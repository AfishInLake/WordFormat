name: CI

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'README*'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.github/**/*.md'
  pull_request:
    branches: [ "**" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'README*'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.github/**/*.md'


jobs:
  # =============== Job 1: 测试 ===============
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Cache ONNX Model
        uses: actions/cache@v5.0.3
        id: cache-model
        with:
          path: src/wordformat/data
          key: ${{ runner.os }}-onnx-model-${{ env.MODEL_VERSION }}
          enableCrossOsArchive: true
        env:
          MODEL_VERSION: "modelv1.0"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0
        with:
          enable-cache: true

      - name: Install GNU Make on Windows
        if: runner.os == 'Windows'
        run: choco install make --no-progress
        shell: bash

      - name: Install project dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Download Model (if not cached)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python scripts/download_model.py

      - name: Run tests
        run: make tests

  # =============== Job 2: 构建前端 UI ===============
  build-ui:
    name: Build UI
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: WordFormatUI/package-lock.json

      - name: Install UI dependencies
        working-directory: WordFormatUI
        run: npm ci

      - name: Build UI
        working-directory: WordFormatUI
        run: npm run build

      - name: Copy dist to api/static
        run: |
          rm -rf src/wordformat/api/static/*
          cp -r WordFormatUI/dist/* src/wordformat/api/static/

      - name: Upload built UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: src/wordformat/api/static/
          retention-days: 1

  # =============== Job 3: 打包 Skill 并发布 ===============
  release:
    needs: [test, build-ui]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download built UI
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: src/wordformat/api/static/

      - name: Package skill folder as ZIP
        run: |
          zip -r wordformat-skill.zip wordformat-skill/ \
            -x "wordformat-skill/scripts/__pycache__/*" \
            -x "wordformat-skill/data/__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: wordformat-skill.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============== Job 4: 发布到 PyPI ===============
  publish-pypi:
    name: Publish to PyPI
    needs: [test, build-ui]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publisher 需要
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download built UI
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: src/wordformat/api/static/

      - name: Cache ONNX Model
        uses: actions/cache@v5.0.3
        id: cache-model
        with:
          path: src/wordformat/data
          key: ${{ runner.os }}-onnx-model-${{ env.MODEL_VERSION }}
        env:
          MODEL_VERSION: "modelv1.0"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.3.0

      - name: Install project dependencies
        run: uv pip install --system -e .

      - name: Download Model (if not cached)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python scripts/download_model.py

      - name: Install build dependencies
        run: uv pip install --system build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
